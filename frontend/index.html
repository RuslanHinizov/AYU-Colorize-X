<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/LogoAndProFoto/ayu_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AYU ColorizeX - AI-powered photo and video colorization platform. Transform black & white memories into stunning color." />
    <meta name="keywords" content="colorize, AI, photo restoration, video colorization, DeOldify, black and white" />
    <meta property="og:title" content="AYU ColorizeX" />
    <meta property="og:description" content="Transform black & white photos and videos into stunning color using advanced AI." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#08080C" />
    <title>AYU ColorizeX</title>
    <script>
      (function(l) {
        if (l.search[1] === 'p') {
          var params = l.search.slice(1).split('&').reduce(function(p, s) {
            var r = s.split('=');
            p[r[0]] = r.slice(1).join('=').replace(/~and~/g, '&');
            return p;
          }, {});
          if (params.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (params.p || '') +
              (params.q ? '?' + params.q : '') + l.hash
            );
          }
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
