version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ayu_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./ai_models:/app/ai_models
      - ./data/media:/app/media
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ayu_db
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      - USE_SQLITE=false
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    container_name: ayu_worker
    command: celery -A workers.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./ai_models:/app/ai_models
      - ./data/media:/app/media
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ayu_db
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      - USE_SQLITE=false
    depends_on:
      - backend
      - redis

  frontend:
    build: ./frontend
    container_name: ayu_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:5173"
    environment:
      - VITE_API_URL=http://localhost:8000

  db:
    image: postgres:15
    container_name: ayu_db
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-ayu_db}
    # ports:
    #   - "5432:5432"  # Uncomment only for local development

  redis:
    image: redis:7
    container_name: ayu_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    # ports:
    #   - "6379:6379"  # Uncomment only for local development

  nginx:
    image: nginx:alpine
    container_name: ayu_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
