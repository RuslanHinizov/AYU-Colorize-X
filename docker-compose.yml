services:
  backend:
    build: ./backend
    container_name: ayu_backend
    # Use --workers 1 for AI workloads (models are process-local); increase only if
    # all AI processing is delegated to Celery workers.
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1"
    volumes:
      - ./backend:/app
      - ./backend/ai_models:/app/ai_models:ro
      - ./data/media:/app/media
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ayu_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      - USE_SQLITE=false
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  worker:
    build: ./backend
    container_name: ayu_worker
    command: celery -A workers.celery_app:celery_app worker -Q main-queue --loglevel=info --concurrency=1
    volumes:
      - ./backend:/app
      - ./backend/ai_models:/app/ai_models:ro
      - ./data/media:/app/media
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ayu_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      - USE_SQLITE=false
    env_file:
      - ./backend/.env
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    container_name: ayu_frontend
    ports:
      - "3000:80"
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: ayu_db
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-ayu_db}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ports:
    #   - "5432:5432"  # Uncomment only for local development

  redis:
    image: redis:7
    container_name: ayu_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ports:
    #   - "6379:6379"  # Uncomment only for local development

  nginx:
    image: nginx:alpine
    container_name: ayu_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
